<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Gradient -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="lightningGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ecf0f1;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="456" height="456" fill="url(#bgGradient)" rx="80" ry="80"/>

    <!-- Lightning Bolt -->
    <path d="M 180 80 L 280 80 L 220 200 L 300 200 L 160 380 L 200 250 L 140 250 Z"
          fill="url(#lightningGradient)"
          stroke="#2c3e50"
          stroke-width="3"/>

    <!-- SABES Text -->
    <text x="228" y="420"
          font-family="Arial, sans-serif"
          font-size="36"
          font-weight="bold"
          text-anchor="middle"
          fill="#ffffff">SABES</text>

    <!-- Small Electric Symbol -->
    <circle cx="350" cy="120" r="25" fill="#e74c3c"/>
    <text x="350" y="130"
          font-family="Arial, sans-serif"
          font-size="20"
          font-weight="bold"
          text-anchor="middle"
          fill="#ffffff">⚡</text>
</svg>