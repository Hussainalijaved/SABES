<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <defs>
        <linearGradient id="splashBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="lightningGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#ecf0f1;stop-opacity:0.9" />
            <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="456" height="456" fill="url(#splashBg)"/>

    <!-- Large Lightning Bolt -->
    <path d="M 150 60 L 300 60 L 220 180 L 320 180 L 140 400 L 200 240 L 120 240 Z"
          fill="url(#lightningGlow)"
          stroke="#2c3e50"
          stroke-width="4"
          opacity="0.95"/>

    <!-- SABES Text -->
    <text x="228" y="340"
          font-family="Arial, sans-serif"
          font-size="48"
          font-weight="bold"
          text-anchor="middle"
          fill="#ffffff"
          stroke="#2c3e50"
          stroke-width="2">SABES</text>

    <!-- Subtitle -->
    <text x="228" y="380"
          font-family="Arial, sans-serif"
          font-size="18"
          text-anchor="middle"
          fill="#ffffff"
          opacity="0.9">Sami and Brothers Electric Store</text>

    <!-- Powered by -->
    <text x="228" y="430"
          font-family="Arial, sans-serif"
          font-size="14"
          text-anchor="middle"
          fill="#ffffff"
          opacity="0.7">Powered by Arslandevs</text>

    <!-- Electric Symbols -->
    <circle cx="80" cy="100" r="15" fill="#e74c3c" opacity="0.8"/>
    <text x="80" y="108"
          font-family="Arial, sans-serif"
          font-size="14"
          font-weight="bold"
          text-anchor="middle"
          fill="#ffffff">⚡</text>

    <circle cx="376" cy="150" r="15" fill="#e74c3c" opacity="0.8"/>
    <text x="376" y="158"
          font-family="Arial, sans-serif"
          font-size="14"
          font-weight="bold"
          text-anchor="middle"
          fill="#ffffff">⚡</text>
</svg>